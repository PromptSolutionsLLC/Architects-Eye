kind = "web"
previewPath = "/"
title = "Architect's Eye"
version = "1.0.0"
id = "artifacts/architects-eye"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26087

[services.development]
run = "pnpm --filter @workspace/architects-eye run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/architects-eye", "run", "build" ]
publicDir = "artifacts/architects-eye/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26087"
BASE_PATH = "/"
